image: python:3.10

stages:
  - prepare
  - lint
  - test

cache:
  paths:
    - .cache/pip/
  key: "python-deps-$CI_COMMIT_REF_SLUG"

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ============================================
# STAGE 1: PREPARE
# ============================================
install_dependencies:
  stage: prepare
  script:
    # Version simple sans $(...) dans echo
    - echo "📦 PREPARE - Installation des dépendances"
    - echo "Vérification versions:"
    - python --version
    - pip --version
    - pip install --upgrade pip
    - pip install -r requirements.txt pytest flake8
    - echo "✅ Dépendances installées"
  artifacts:
    paths:
      - .cache/pip/
    expire_in: 1 hour

# ============================================
# STAGE 2: LINT
# ============================================
run_lint:
  stage: lint
  script:
    - echo "🔍 LINT - Analyse qualité du code"
    - bash ci/gitlab/scripts/lint.sh || echo "⚠️  Lint warnings (non bloquant)"
  needs: ["install_dependencies"]
  allow_failure: true

# ============================================
# STAGE 3: TEST
# ============================================
run_tests:
  stage: test
  script:
    - echo "🧪 TEST - Exécution des tests unitaires"
    - python -m pytest -q -v --tb=short
    - echo "✅ Tests terminés avec succès"
  needs: ["install_dependencies"]