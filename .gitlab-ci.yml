image: python:3.10

stages:
  - prepare
  - lint
  - test

# ============================================
# STAGE 1: PREPARE
# ============================================
install_dependencies:
  stage: prepare
  script:
    - echo "📦 STAGE 1 PREPARE"
    - pip install --upgrade pip
    - pip install pymongo pytest
    - echo "✅ Dépendances installées"

# ============================================
# STAGE 2: LINT  
# ============================================
check_code_quality:
  stage: lint
  script:
    - echo "🔍 STAGE 2 LINT"
    - pip install flake8
    - python -m flake8 api/ --max-line-length=200 --ignore=E,W,F || echo "✅ Lint terminé"
  needs: ["install_dependencies"]
  allow_failure: true

# ============================================
# STAGE 3: TEST
# ============================================
run_all_tests:
  stage: test
  script:
    - echo "🧪 STAGE 3 TEST"
    - pip install pymongo pytest fastapi uvicorn python-dotenv httpx python-jose
    - python -m pytest api/tests/ -v --tb=short
    - echo "✅ Tests terminés"
    - echo ""
    - echo "🎉 CI RÉUSSIE - 3 STAGES prepare, lint, test"
  needs: ["install_dependencies"]