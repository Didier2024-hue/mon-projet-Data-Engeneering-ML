stages:
  - lint
  - test

variables:
  GIT_STRATEGY: clone

# ============================================================
# 🔍 LINT — Vérification avec flake8 (venv éphémère)
# ============================================================
lint:
  stage: lint
  script:
    - echo "🔍 Lancement du linting Python..."
    - cd "$CI_PROJECT_DIR"
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install flake8
    - bash ci/gitlab/scripts/lint.sh
  tags:
    - cde-runner
  allow_failure: false

# ============================================================
# 🧪 TESTS — Exécuter pytest dans le conteneur fastapi-cde
# ============================================================
tests:
  stage: test
  script:
    - echo "🧪 Exécution des tests API..."
    - cd "$CI_PROJECT_DIR"
    - bash ci/gitlab/scripts/tests.sh
  tags:
    - cde-runner
  allow_failure: false
  needs: ["lint"]
