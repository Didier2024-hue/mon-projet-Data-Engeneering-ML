image: python:3.10

stages:
  - prepare
  - lint
  - test

default:
  before_script:
    - echo "Installation dépendances CI..."
    - if [ -f ci/gitlab/scripts/env_info.sh ]; then 
        bash ci/gitlab/scripts/env_info.sh
      else
        echo "env_info.sh absent (OK pour le moment)"
      fi

job_prepare:
  stage: prepare
  script:
    - echo "Installation dépendances CI..."
    - pip install -r requirements.txt pytest flake8

