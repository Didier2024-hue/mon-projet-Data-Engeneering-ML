run_all_tests:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: "tcp://docker:2375/"
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "🐳 Démarrage docker-compose"
    - docker compose up -d

    - echo "⏳ Attente de fastapi-cde..."
    - sleep 25

    - echo "🔎 Conteneurs démarrés :"
    - docker ps -a

    - echo "🧪 Exécution des tests dans fastapi-cde"
    - docker exec fastapi-cde pytest -v

    - echo "🎉 Tests terminés avec succès"

  needs: ["install_dependencies"]
  tags: []
