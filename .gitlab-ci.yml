image: python:3.10

stages:
  - prepare
  - lint
  - test

default:
  before_script:
    - echo "🐍 Installation dépendances CI..."
    - pip install -r requirements.txt pytest flake8

job_prepare:
  stage: prepare
  script:
    - echo "📦 Dépendances installées"

job_lint:
  stage: lint
  script:
    - bash ci/gitlab/scripts/lint.sh

job_test:
  stage: test
  script:
    - echo "🧪 Tests en cours..."
    - pytest -q
