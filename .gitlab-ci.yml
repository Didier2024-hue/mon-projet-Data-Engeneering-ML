image: python:3.10

stages:
  - prepare
  - lint
  - test

# -------------------------------------------
# STAGE 1 — PREPARE
# -------------------------------------------
install_dependencies:
  stage: prepare
  script:
    - pip install --upgrade pip
    - pip install pymongo pytest
  tags: []

# -------------------------------------------
# STAGE 2 — LINT (NON BLOQUANT)
# -------------------------------------------
check_code_quality:
  stage: lint
  script:
    - pip install flake8
    - python -m flake8 api/ --max-line-length=200 --ignore=E302,E303,E305,E402,E501,W291,W293,W391,F401,F841 --count --statistics || true
  needs: ["install_dependencies"]
  allow_failure: true
  tags: []

# -------------------------------------------
# STAGE 3 — TEST (AVEC MOCK MONGO)
# -------------------------------------------
run_all_tests:
  stage: test
  script:
    # Dépendances nécessaires
    - pip install pymongo pytest fastapi uvicorn python-dotenv httpx python-jose passlib bcrypt

    # Petit .env (ton API le demande)
    - echo "MONGO_URI=mongodb://localhost:27017" > api/.env.api
    - echo "MONGO_DB=test" >> api/.env.api

    # MOCK Mongo (simple, fiable, compatible db["users"])
    - |
      cat > api/services/mongo_service.py << 'EOF'
      class FakeCollection:
          def find(self, *args, **kwargs): return []
          def find_one(self, *args, **kwargs): return None
          def insert_one(self, *args, **kwargs):
              class Result: inserted_id = "mock_id"
              return Result()
          def update_one(self, *args, **kwargs):
              class Result: modified_count = 1
              return Result()
          def delete_one(self, *args, **kwargs):
              class Result: deleted_count = 1
              return Result()

      class FakeDB:
          def __getitem__(self, name):
              return FakeCollection()

      client = None
      db = FakeDB()

      def get_mongo_db(uri, db_name, max_retries=5):
          print("⚠️ Mock MongoDB — no real connection")
          return None, FakeDB()
      EOF

    # Tests réels
    - python -m pytest api/tests/ -v --tb=short

  needs: ["install_dependencies"]
  tags: []
