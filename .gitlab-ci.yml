image: python:3.10

stages:
  - prepare
  - lint
  - test

install_dependencies:
  stage: prepare
  script:
    - echo "STAGE 1: PREPARE - Installation"
    - pip install --upgrade pip
    - pip install pymongo pytest flake8
    - echo "Dépendances installées"

check_code_quality:
  stage: lint
  script:
    - echo "STAGE 2: LINT - Analyse qualité"
    - python -m flake8 api/ --max-line-length=200 --count --statistics
    - echo "Lint terminé"
  needs: ["install_dependencies"]
  allow_failure: true

run_all_tests:
  stage: test
  script:
    - echo "STAGE 3: TEST - Exécution"
    - python -m pytest -v --tb=short
    - echo "TESTS TERMINÉS"
    - echo "CI RÉUSSIE - 3 STAGES COMPLÉTÉS"
  needs: ["install_dependencies"]