services:
  redis-airflow:
    image: redis:latest
    container_name: redis-airflow
    restart: unless-stopped
    networks:
      - cde_cde_net
    ports:
      - "6380:6379"

  airflow-webserver:
    image: apache/airflow:2.9.3-python3.10
    container_name: airflow-webserver
    restart: unless-stopped
    depends_on:
      - redis-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-cde:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "changeme_airflow_secret"
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./requirements_airflow.txt:/requirements_airflow.txt
    ports:
      - "8080:8080"
    networks:
      - cde_cde_net
    command: >
      bash -c "
      pip install --no-cache-dir -r /requirements_airflow.txt &&
      airflow db upgrade &&
      airflow webserver
      "

  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.10
    container_name: airflow-scheduler
    restart: unless-stopped
    depends_on:
      - redis-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-cde:5432/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./requirements_airflow.txt:/requirements_airflow.txt
    networks:
      - cde_cde_net
    command: >
      bash -c "
      pip install --no-cache-dir -r /requirements_airflow.txt &&
      airflow db upgrade &&
      airflow scheduler
      "

networks:
  cde_cde_net:
    external: true
