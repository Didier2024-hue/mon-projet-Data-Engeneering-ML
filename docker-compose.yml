services:
  # --------------------------
  # PostgreSQL
  # --------------------------
  postgres:
    image: postgres:15
    container_name: postgres-cde
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: trustpilot
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d trustpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    networks:
      - cde_net

  # --------------------------
  # MongoDB
  # --------------------------
  mongo:
    image: mongo:6
    container_name: mongo-cde
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: trustpilot
    ports:
      - "27017:27017"
    volumes:
      - ./docker-data/mongodb:/data/db
    command: --auth
    mem_limit: 512m
    networks:
      - cde_net

  # --------------------------
  # MLFLOW
  # --------------------------
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow-cde
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      mlflow server 
      --backend-store-uri postgresql+psycopg2://admin:admin@postgres:5432/mlflow_db 
      --default-artifact-root file:///app/mlruns 
      --host 0.0.0.0 
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1g
    networks:
      - cde_net

  # --------------------------
  # FastAPI
  # --------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    container_name: fastapi-cde
    restart: unless-stopped
    env_file:
      - ./api/.env.api
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./api/services:/app/services
      - ./data:/app/data
      - ./logs:/app/log
      - ./data/model:/app/data/model
      - ./data/api:/app/data/api
    depends_on:
      - mongo
      - postgres
      - mlflow
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    mem_limit: 512m
    networks:
      - cde_net

  # --------------------------
  # Streamlit Dashboard (API)
  # --------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: streamlit-dashboard
    restart: unless-stopped
    env_file:
      - ./api/.env.api
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8501:8501"
    volumes:
      - ./api/scripts:/app/scripts
      - ./api/services:/app/services
      - ./data:/app/data
      - ./logs:/app/log
    depends_on:
      - mongo
      - postgres
      - api
      - mlflow
    command: streamlit run /app/scripts/app_api/app.py --server.port 8501 --server.address 0.0.0.0
    mem_limit: 512m
    networks:
      - cde_net

  # --------------------------
  # Streamlit ML Tester
  # --------------------------
  ml_tester:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: streamlit-ml
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_MODEL: /app/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8502:8502"
    volumes:
      - ./scripts/app:/app/scripts
      - ./api/services:/app/services
      - ./data:/app/data
      - ./logs:/app/log
      - ./data/model:/app/models
    depends_on:
      - mongo
      - postgres
      - mlflow
    command: streamlit run /app/scripts/app_streamlit.py --server.port 8502 --server.address 0.0.0.0
    mem_limit: 4g
    networks:
      - cde_net

# --------------------------
# Réseau personnalisé
# --------------------------
networks:
  cde_net:
    driver: bridge
