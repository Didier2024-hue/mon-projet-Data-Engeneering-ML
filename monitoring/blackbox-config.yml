modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 301, 302, 307, 308]
      no_follow_redirects: false
      fail_if_ssl: false
      fail_if_not_ssl: false
      method: GET
      headers:
        User-Agent: "Blackbox Exporter/1.0"
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: true
      
  http_fastapi:
    prober: http
    timeout: 5s
    http:
      method: GET
      headers:
        Accept: "application/json"
      preferred_ip_protocol: "ip4"
      
  tcp_connect:
    prober: tcp
    timeout: 5s
    
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: "ip4"
