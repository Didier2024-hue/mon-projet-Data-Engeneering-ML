apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus-cde:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
      httpMethod: POST
      
  - name: Loki
    type: loki
    access: proxy
    url: http://loki-cde:3100
    editable: true
    jsonData:
      maxLines: 1000
