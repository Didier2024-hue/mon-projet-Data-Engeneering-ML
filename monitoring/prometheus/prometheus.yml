global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cde-monitoring'
    environment: 'production'

scrape_configs:
  # --- Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # --- Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 10s

  # --- cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 10s

  # --- MongoDB Exporter
  - job_name: 'mongodb-exporter'
    static_configs:
      - targets: ['mongodb-exporter:9216']
    scrape_interval: 15s

  # --- Blackbox Exporter : probes HTTP
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://mlflow-cde:5000
        - http://fastapi-cde:8000/health
        - http://streamlit-dashboard:8501
        - http://streamlit-ml:8502
        - http://airflow-webserver:8080/health  # ← CHANGÉ ICI
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115